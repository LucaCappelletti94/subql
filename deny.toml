[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []

# Allow git dependency for sqlparser (upstream requires git version)
[[bans.skip]]
name = "sqlparser"
reason = "upstream requires git dependency"

[advisories]
ignore = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-git = ["https://github.com/apache/datafusion-sqlparser-rs"]
